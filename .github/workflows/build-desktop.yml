name: Build Desktop Tracker

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare standalone build dir
        run: |
          mkdir -p "$RUNNER_TEMP/archtrack-build"
          cp -R desktop/. "$RUNNER_TEMP/archtrack-build/"
          rm -rf "$RUNNER_TEMP/archtrack-build/node_modules" "$RUNNER_TEMP/archtrack-build/release"

      - name: Install deps and build
        working-directory: ${{ runner.temp }}/archtrack-build
        run: |
          npm install
          npm run build

      - name: Package Mac app
        working-directory: ${{ runner.temp }}/archtrack-build
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Re-sign with correct identifier
        working-directory: ${{ runner.temp }}/archtrack-build
        run: |
          for dir in release/mac-arm64/ArchTrack.app release/mac/ArchTrack.app; do
            if [ -d "$dir" ]; then
              find "$dir" -type f -perm +111 -path "*/Frameworks/*" -exec codesign --force --sign - {} \; 2>/dev/null || true
              find "$dir/Contents/Frameworks" -name "*.dylib" -exec codesign --force --sign - {} \; 2>/dev/null || true
              find "$dir/Contents/Frameworks" -name "*.framework" -exec codesign --force --sign - {} \; 2>/dev/null || true
              find "$dir/Contents/Frameworks" -name "*.app" -exec codesign --force --sign - {} \; 2>/dev/null || true
              codesign --force --sign - --identifier live.archtrack.tracker "$dir"
            fi
          done

      - name: Copy artifacts to workspace
        run: |
          mkdir -p release
          cp "$RUNNER_TEMP"/archtrack-build/release/ArchTrack-*.dmg release/ 2>/dev/null || true
          cp "$RUNNER_TEMP"/archtrack-build/release/ArchTrack-*-mac.zip release/ 2>/dev/null || true
          ls -lh release/

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: release/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare standalone build dir
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/archtrack-build"
          cp -R desktop/. "$RUNNER_TEMP/archtrack-build/"
          rm -rf "$RUNNER_TEMP/archtrack-build/node_modules" "$RUNNER_TEMP/archtrack-build/release"

      - name: Install deps, build, and package
        shell: bash
        working-directory: ${{ runner.temp }}/archtrack-build
        run: |
          npm install
          npm run dist:win

      - name: Copy artifacts to workspace
        shell: bash
        run: |
          mkdir -p release
          cp "$RUNNER_TEMP"/archtrack-build/release/ArchTrack*.exe release/ 2>/dev/null || true
          ls -lh release/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: release/

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mac-builds/*
            windows-builds/*
