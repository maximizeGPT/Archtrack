name: Build Desktop Tracker

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/../archtrack-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare standalone build dir
        run: |
          mkdir -p "$BUILD_DIR"
          cp -R desktop/. "$BUILD_DIR/"
          rm -rf "$BUILD_DIR/node_modules" "$BUILD_DIR/release"

      - name: Install deps and build
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          npm install
          npm run build

      - name: Upscale icon if needed
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          WIDTH=$(sips -g pixelWidth assets/icon.png | tail -1 | awk '{print $2}')
          if [ "$WIDTH" -lt 512 ]; then
            sips -z 1024 1024 assets/icon.png --out assets/icon.png
          fi

      - name: Package Mac app
        working-directory: ${{ env.BUILD_DIR }}
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Re-sign with correct identifier
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          for dir in release/mac-arm64/ArchTrack.app release/mac/ArchTrack.app; do
            if [ -d "$dir" ]; then
              find "$dir" -type f -perm +111 -path "*/Frameworks/*" -exec codesign --force --sign - {} \; 2>/dev/null || true
              find "$dir/Contents/Frameworks" -name "*.dylib" -exec codesign --force --sign - {} \; 2>/dev/null || true
              find "$dir/Contents/Frameworks" -name "*.framework" -exec codesign --force --sign - {} \; 2>/dev/null || true
              find "$dir/Contents/Frameworks" -name "*.app" -exec codesign --force --sign - {} \; 2>/dev/null || true
              codesign --force --sign - --identifier live.archtrack.tracker "$dir"
            fi
          done

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            ${{ env.BUILD_DIR }}/release/ArchTrack-*.dmg
            ${{ env.BUILD_DIR }}/release/ArchTrack-*-mac.zip

  build-windows:
    runs-on: windows-latest
    env:
      BUILD_DIR: ${{ github.workspace }}\..\archtrack-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare standalone build dir
        shell: bash
        run: |
          BUILD_DIR="${GITHUB_WORKSPACE}/../archtrack-build"
          mkdir -p "$BUILD_DIR"
          cp -R desktop/. "$BUILD_DIR/"
          rm -rf "$BUILD_DIR/node_modules" "$BUILD_DIR/release"

      - name: Install deps, build, and package
        shell: bash
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          npm install
          npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: ${{ env.BUILD_DIR }}/release/ArchTrack*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mac-builds/*
            windows-builds/*
